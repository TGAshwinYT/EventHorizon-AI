name: Daily Mandi Python Fetcher

on:
  schedule:
    - cron: '30 0 * * *' # Runs at 6:00 AM IST daily
  workflow_dispatch: # Allows you to manually trigger it

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: Run Fetch Script
        env:
          - name: Run daily Mandi data fetch
        run: python update_mandi.py
        env:
          AGMARKNET_API_KEY: ${{ secrets.AGMARKNET_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend  # <-- This tells GitHub to open the backend folder
          python -u trigger_manual_fetch.py
