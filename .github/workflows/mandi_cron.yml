name: Daily Mandi Python Fetcher

on:
  schedule:
    # PRIMARY run: 11:00 AM IST (5:30 UTC) — data.gov.in updates around 8-10 AM IST
    - cron: '30 5 * * *'
    # RETRY run: 2:00 PM IST (8:30 UTC) — catches days when API updates late
    - cron: '30 8 * * *'
  workflow_dispatch:  # Manual trigger anytime

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Kill job if it hangs more than 30 min

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily Mandi data fetch
        env:
          AGMARKNET_API_KEY: ${{ secrets.AGMARKNET_API_KEY }}
          MANDI_DATABASE_URL: ${{ secrets.MANDI_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.MANDI_DATABASE_URL }}
        run: |
          cd backend
          python -u trigger_manual_fetch.py

      - name: Notify on failure
        if: failure()
        run: echo "Mandi fetch failed! Check logs above."