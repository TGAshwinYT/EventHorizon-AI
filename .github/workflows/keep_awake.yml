name: Keep Hugging Face Space Awake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ping-space:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Hugging Face
        run: |
          node -e "
          console.log('Sending wake-up signal to Hugging Face...');
          fetch('https://tgashwinyt-eventhorizon-backend.hf.space')
            .then(res => {
              console.log('Successfully hit the server! Status code: ' + res.status);
              if (res.status === 200) {
                console.log('The server is awake and ready.');
              }
            })
            .catch(err => {
              console.error('Failed to reach server:', err);
              process.exit(1);
            });
          "