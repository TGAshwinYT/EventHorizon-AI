name: Keep Hugging Face Space Awake

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  ping-space:
    runs-on: ubuntu-22.04 # <-- THIS IS THE MAGIC FIX
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Headless Browser
        run: npm install puppeteer

      - name: Visit the App
        run: |
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            console.log('Starting hidden browser...');
            const browser = await puppeteer.launch({ 
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox'] 
            });
            const page = await browser.newPage();
            
            console.log('Navigating to Hugging Face...');
            await page.goto('https://huggingface.co/spaces/TGAshwinYT/EventHorizon-Backend', { waitUntil: 'networkidle2' });
            
            console.log('Successfully loaded the space! The server is awake.');
            await browser.close();
          })();
          "