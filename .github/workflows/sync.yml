name: Sync to Hugging Face Hub

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 
          lfs: true 

      - name: Push backend folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Go inside your backend folder
          cd backend
          
          # 2. THE NUCLEAR FIX: Physically delete the MP3s from the temporary runner
          rm -rf app/static/audio/*.mp3
          
          # 3. Destroy the parent Git folder so it stops confusing the system
          rm -rf ../.git
          
          # 4. Set up a perfectly clean Git identity
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 5. Package and Force Push
          git checkout -b main
          git add .
          git commit -m "Sync to Hugging Face (Audio Removed)"
          git push --force https://TGAshwinYT:$HF_TOKEN@huggingface.co/spaces/TGAshwinYT/EventHorizon-Backend main