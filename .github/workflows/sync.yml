name: Sync to Hugging Face Hub

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 
          lfs: true 

      - name: Push backend folder to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Go inside your backend folder
          cd backend
          
          # 2. Set up the temporary Git identity
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # 3. THE FIX: Tell Git to completely ignore your generated audio files!
          echo "app/static/audio/*.mp3" >> .gitignore
          
          # 4. Package the folder
          git checkout -b main
          git add .
          git commit -m "Sync backend to Hugging Face (Excluding Audio)"
          
          # 5. Push to your Space
          git push --force https://TGAshwinYT:$HF_TOKEN@huggingface.co/spaces/TGAshwinYT/EventHorizon-Backend main