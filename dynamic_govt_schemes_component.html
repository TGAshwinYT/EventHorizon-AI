const CATS = ["All", ...new Set(SCHEMES.map(s => s.cat))];
let activeCat = "All";
let expandedId = null;
let searchVal = "";
let lang = "en";

function init() {
  renderCatTags();
  renderSchemes();

  document.getElementById("lang-sel").addEventListener("change", e => {
    lang = e.target.value;
    renderSchemes();
  });

  document.getElementById("scheme-search").addEventListener("input", e => {
    searchVal = e.target.value.toLowerCase();
    renderSchemes();
  });
}

function renderCatTags() {
  const wrap = document.getElementById("cat-tags");
  wrap.innerHTML = CATS.map(c => `<button class="tag${activeCat===c?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(c) {
  activeCat = c;
  renderCatTags();
  renderSchemes();
}

function renderSchemes() {
  const grid = document.getElementById("schemes-grid");
  let filtered = SCHEMES.filter(s => {
    const catOk = activeCat === "All" || s.cat === activeCat;
    const n = (s.name[lang] || s.name.en).toLowerCase();
    const d = (s.desc[lang] || s.desc.en).toLowerCase();
    const searchOk = !searchVal || n.includes(searchVal) || d.includes(searchVal) || s.cat.toLowerCase().includes(searchVal);
    return catOk && searchOk;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><i class="ti ti-mood-empty" style="font-size:28px;display:block;margin-bottom:8px" aria-hidden="true"></i>No schemes found. Try a different search or category.</div>';
    return;
  }

  grid.innerHTML = filtered.map(s => renderCard(s)).join('');
}

function renderCard(s) {
  const name = s.name[lang] || s.name.en;
  const desc = s.desc[lang] || s.desc.en;
  const isExp = expandedId === s.id;
  return `<div class="scheme-card${isExp?' expanded':''}" onclick="toggleExpand('${s.id}')">
    <div class="card-head">
      <div class="card-icon ${s.color}" aria-hidden="true"><i class="ti ${s.icon}"></i></div>
      <div>
        <div class="card-title">${name}${s.new?'<span class="new-pill"><i class="ti ti-sparkles" style="font-size:10px" aria-hidden="true"></i> New</span>':''}</div>
        <div class="card-sub">${s.cat}</div>
      </div>
    </div>
    <div class="badges">
      <span class="badge elig"><i class="ti ti-users" style="font-size:11px;vertical-align:-1px" aria-hidden="true"></i> ${s.eligibility.length > 38 ? s.eligibility.slice(0,38)+'…' : s.eligibility}</span>
    </div>
    <p class="card-desc">${desc}</p>
    ${isExp ? `<div class="expand-body">
      <div class="detail-row"><span class="dl">Key benefit</span><span class="dv">${s.benefit}</span></div>
      <div class="action-row">
        <a href="${s.applyLink}" target="_blank" class="btn-apply" onclick="event.stopPropagation()"><i class="ti ti-external-link" aria-hidden="true"></i> Apply Now</a>
        <button class="btn-yt" onclick="event.stopPropagation(); openYT('${s.ytQuery}')"><i class="ti ti-brand-youtube" aria-hidden="true"></i> Watch Guide</button>
        <button class="btn-ask" onclick="event.stopPropagation(); askHorizon('${s.id}','${lang}')"><i class="ti ti-message-circle" aria-hidden="true"></i> Ask Horizon ↗</button>
      </div>
    </div>` : ''}
    <div style="margin-top:6px;font-size:11px;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px">
      <i class="ti ${isExp?'ti-chevron-up':'ti-chevron-down'}" aria-hidden="true" style="font-size:13px"></i>
      ${isExp?'Collapse':'Tap for details & apply'}
    </div>
  </div>`;
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderSchemes();
}

function openYT(q) {
  const url = "https://www.youtube.com/results?search_query=" + encodeURIComponent(q + " farm scheme how to apply");
  window.open(url, "_blank");
}

function askHorizon(id, lang) {
  const s = SCHEMES.find(x => x.id === id);
  if (!s) return;
  const name = s.name[lang] || s.name.en;
  sendPrompt(`Tell me in detail about the ${name} government scheme — who can apply, step-by-step how to apply online, documents needed, and what benefits I will get. Explain in simple language.`);
}

init();
</script>
